<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Neural network: 2 input nodes, 3 hidden, 2 output -->
  <!-- Connections -->
  <line x1="4" y1="8" x2="10" y2="5.5" stroke-opacity="0.5"/>
  <line x1="4" y1="8" x2="10" y2="12" stroke-opacity="0.5"/>
  <line x1="4" y1="8" x2="10" y2="18.5" stroke-opacity="0.5"/>
  <line x1="4" y1="16" x2="10" y2="5.5" stroke-opacity="0.5"/>
  <line x1="4" y1="16" x2="10" y2="12" stroke-opacity="0.5"/>
  <line x1="4" y1="16" x2="10" y2="18.5" stroke-opacity="0.5"/>
  <line x1="14" y1="5.5" x2="20" y2="9" stroke-opacity="0.5"/>
  <line x1="14" y1="5.5" x2="20" y2="15" stroke-opacity="0.5"/>
  <line x1="14" y1="12" x2="20" y2="9" stroke-opacity="0.5"/>
  <line x1="14" y1="12" x2="20" y2="15" stroke-opacity="0.5"/>
  <line x1="14" y1="18.5" x2="20" y2="9" stroke-opacity="0.5"/>
  <line x1="14" y1="18.5" x2="20" y2="15" stroke-opacity="0.5"/>
  <!-- Input nodes -->
  <circle cx="4" cy="8" r="2" fill="white"/>
  <circle cx="4" cy="16" r="2" fill="white"/>
  <!-- Hidden nodes -->
  <circle cx="12" cy="5.5" r="2" fill="white"/>
  <circle cx="12" cy="12" r="2.5" fill="white"/>
  <circle cx="12" cy="18.5" r="2" fill="white"/>
  <!-- Output nodes -->
  <circle cx="20" cy="9" r="2" fill="white"/>
  <circle cx="20" cy="15" r="2" fill="white"/>
</svg>
